
services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sandbox-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - sandbox-network
    restart: unless-stopped

  api:
    build:
      context: ./platform
      dockerfile: Dockerfile.api
    container_name: sandbox-api
    ports:
      - "${PLATFORM_PORT:-8080}:8080"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PLATFORM_PORT=${PLATFORM_PORT:-8080}
    networks:
      - sandbox-network
    restart: unless-stopped
    depends_on:
      - nginx

networks:
  sandbox-network:
    name: sandbox-network
    driver: bridge
